<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starbucks Clone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
         .card-body {
            background-color: rgb(218, 227, 218);
            color: aliceblue;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
        }
         .col-12 {
            color: aliceblue;
            font-size: 18px;
            font-weight: bold;
            padding: 20px;
        }
          .carousel-item img {
              height: 400px;
              object-fit: cover;
          }
          navbar .nav-link {
              color: white;
              font-weight: bold;
          }
          carousel slide {
              margin-top: 20px;
          }
          .d-flex {
              margin-top: 10px;
          }
          .navbar{
          height: 80px;
          display:flex;
          align-items:center;
          justify-content:space-between;
          padding:0 40px;
          background:white;
          }
          .active{
            border-bottom:3px solid green;
            padding-bottom:8px;
          }
          .hero-card{
            display:flex;
            justify-content:space-between;
            align-items:center;
          }
          .arrow{
          position:absolute;
          top:50%;
          transform:translateY(-50%);
          }
          .img-fluid{
            border-radius:50%;
            width:108px;
            height:108px;

          }
          .img-fluid:hover{
            transform:scale(0.95);
            transition:transform 0.3s ease;
            border: 2px solid green;
          }
           .images{
            margin-top:20px;
          }
          h2{
            color: black;
          }
    </style>

</head>

<body>
  <!-- NavBar -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
    <a class="navbar-brand" href="#">Home</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="#">Gift</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Order</a>
        </li>
          <li class="nav-item">
          <a class="nav-link" href="#">Pay</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Store</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="#">Corporate Gifting</a>
        </li>
        
      </ul>
      <!-- Search bar -->
      <form class="d-flex" role="search">
        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" style="border-radius: 100px;"/>
        <button class="btn btn-outline-success" type="submit"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
        <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
         </svg></button>
      </form>
    </div>
  </div>
</nav>


<div class="card-body container" style="background-color: rgb(35, 84, 35); color: white;">
  Welcome Starbucks
</div>

<!-- Carousel -->
<div id="carouselExample" class="carousel slide">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="https://images.pexels.com/photos/459489/pexels-photo-459489.jpeg" class="d-block w-100" alt="coffee">
    </div>
    <div class="carousel-item">
      <img src="https://images.pexels.com/photos/459489/pexels-photo-459489.jpeg" class="d-block w-100" alt="coffee">
    </div>
    <div class="carousel-item">
      <img src="https://images.pexels.com/photos/459489/pexels-photo-459489.jpeg" class="d-block w-100" alt="coffee">
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>

<div class="col-12">
  <h2>Handcrafted Coffee, Tea, and More</h2>
</div>

<div class="container images">
  <div class="row">
    <div class="col-2">
      <img src="https://images.pexels.com/photos/28496565/pexels-photo-28496565.jpeg" alt="Image 1" class="img-fluid">
    </div>
    <div class="col-2">
      <img src="https://images.pexels.com/photos/36848520/pexels-photo-36848520.jpeg" alt="Image 2" class="img-fluid">
    </div>
    <div class="col-2">
      <img src="https://images.pexels.com/photos/12540692/pexels-photo-12540692.png" alt="Image 3" class="img-fluid">
    </div>
    <div class="col-2">
      <img src="https://images.pexels.com/photos/5665246/pexels-photo-5665246.jpeg" alt="Image 4" class="img-fluid">
    </div><div class="col-2">
      <img src="https://images.pexels.com/photos/36851643/pexels-photo-36851643.jpeg" alt="Image 5" class="img-fluid">
    </div><div class="col-2">
      <img src="https://images.pexels.com/photos/34579318/pexels-photo-34579318.jpeg" alt="Image 6" class="img-fluid">
    </div>
  </div>
</div>

</body>
</html>
