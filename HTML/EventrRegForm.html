<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <h1>Hackathon Event</h1>
    <fieldset>
        <legend>Event Registration Form</legend>
        <label for="Personal Details">Name : </label>
        <input type="text" name="" id="" placeholder="Enter Name"><br>
        <label for="email">E-mail : </label>
        <input type="email" name="" id="" placeholder="Enter Email">
    </fieldset>

    <fieldset>
        <label for="pass">Password : </label>
        <input type="password" name="pass" id="pass" placeholder="Enter Password">
    </fieldset>

    <fieldset>
        <ul>
            <li>collab with tech minds</li>
            <li>24 hr hackathon</li>
        </ul>
    </fieldset>

    <fieldset>
        <legend>Other Info</legend>
        <label for="choice">Snacks</label>
        <select name="choice" id="">
            <option value="Select the snack you love">Select the snack you love</option>
            <option value="Samosa">Samosa</option>
            <option value="Dosa">Dosa</option>
            <option value="Patties">Patties</option>
        </select>
    </fieldset>

    <fieldset>
        <legend>Venue</legend>
    <label for="">E2 Auditorium</label>
    </fieldset>
    <br>
    <fieldset>
        <input type="checkbox" name="checkbox" id="">Agree to terms and Conditions<br><br>
        <input type="submit" value="Submit form">
    </fieldset>
</body>
</html>
